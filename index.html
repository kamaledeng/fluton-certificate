<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Fluton Certificate</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef2ff,#fdf4ff);
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.wrapper{
display:flex;
gap:40px;
}

.card{
background:white;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.1);
padding:40px;
}

#certificate{
width:420px;
text-align:center;
}

.title{
color:#7c3aed;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
border:4px solid #c4b5fd;
display:flex;
align-items:center;
justify-content:center;
margin:20px auto;
font-size:30px;
}

.role{
background:#ede9fe;
color:#7c3aed;
padding:6px 14px;
border-radius:20px;
display:inline-block;
margin-top:10px;
}

.desc{
color:#6b7280;
font-size:14px;
margin-top:15px;
}

.tag{
color:#7c3aed;
margin-top:20px;
font-weight:bold;
}

.form{
width:350px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7c3aed,#ec4899);
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="wrapper">

<div id="certificate" class="card">

<h2 class="title">FLUTON CERTIFICATE</h2>

<div class="avatar" id="avatar">?</div>

<h3 id="name">Your Name</h3>

<div class="role" id="role">Initiate</div>

<p class="desc">
Welcome to the Fluton community.
You've completed verification and joined the ecosystem.
</p>

<div class="tag">#Fluton</div>

</div>

<div class="card form">

<label>X Username</label>
<input id="username" placeholder="elonmusk">

<label>Role</label>

<select id="roleInput">
<option>Initiate</option>
<option>Encrypted</option>
<option>Fluton Creator</option>
<option>Fluton Apex</option>
</select>

<button onclick="updateCert()">Generate Certificate</button>

<br><br>

<button onclick="downloadCert()">Download PNG</button>

</div>

</div>

<script>

function updateCert(){

let name=document.getElementById("username").value
let role=document.getElementById("roleInput").value

document.getElementById("name").innerText=name
document.getElementById("role").innerText=role

}

function downloadCert(){

html2canvas(document.getElementById("certificate")).then(canvas=>{

let link=document.createElement("a")
link.download="fluton-certificate.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
